<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A1F44" />
    <title>Offline | Adventist Giving Luzon</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f1e3;
        color: #1f2933;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(680px, calc(100% - 32px));
        border-radius: 28px;
        background: #ffffff;
        padding: 36px;
        box-shadow: 0 20px 45px rgba(10, 31, 68, 0.10);
      }
      .badge {
        display: inline-flex;
        border-radius: 999px;
        background: #fbf0cf;
        color: #0a1f44;
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      h1 {
        margin: 18px 0 12px;
        color: #0a1f44;
        font-size: clamp(32px, 7vw, 52px);
        line-height: 1.04;
      }
      p {
        margin: 0;
        color: rgba(10, 31, 68, 0.72);
        font-size: 17px;
        line-height: 1.7;
      }
      a {
        display: inline-flex;
        margin-top: 24px;
        border-radius: 999px;
        background: #d6a935;
        color: #0a1f44;
        padding: 13px 18px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Offline mode</span>
      <h1>You are offline right now.</h1>
      <p>
        Adventist Giving Luzon is installed on this device, but this page needs an internet connection to refresh giving details.
        Please reconnect and try again.
      </p>
      <a href="/">Return Home</a>
    </main>
  </body>
</html>
